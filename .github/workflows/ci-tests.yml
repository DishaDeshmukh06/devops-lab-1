name: CI Unit Tests

on:
  push:
    branches: [ main, test-pr-flow ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        # Agar koi aur requirements hain toh yahan add karein

    - name: Run Tests
      run: |
        pytest